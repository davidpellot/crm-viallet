<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--wine:#722f37;--dark:#2a1f14;--cream:#f5f1ea;--card:#fff;--border:#e8e2d4;--muted:#8a7e6b;--text:#2a1f14;--bg2:#f8f5f0;--green:#4e8f58;--orange:#c49a2e;--blue:#6b87ad;--red:#c0392b}
body{font-family:Palatino,Georgia,serif;background:var(--cream);color:var(--text);min-height:100vh}
input,select,textarea,button{font-family:inherit}
.header{background:linear-gradient(135deg,#2a1f14 0%,#3d2028 50%,#722f37 100%);padding:16px 28px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.header h1{color:#fff;font-size:21px;letter-spacing:-0.3px}
.header .sub{color:rgba(255,255,255,0.45);font-size:11px;letter-spacing:2.5px;text-transform:uppercase;font-family:system-ui}
.ha{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.ha span{color:rgba(255,255,255,0.6);font-size:13px;font-family:system-ui}
.ha b{color:#fff}
.hbtn{padding:8px 14px;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);border-radius:8px;color:#fff;cursor:pointer;font-weight:600;font-size:12px;transition:background 0.15s;position:relative}
.hbtn:hover{background:rgba(255,255,255,0.22)}
.hbtn.logout{background:rgba(255,255,255,0.06);border-color:rgba(255,255,255,0.1);color:rgba(255,255,255,0.6)}
.alert-badge{position:absolute;top:-6px;right:-6px;background:var(--red);color:#fff;font-size:10px;font-weight:800;padding:2px 6px;border-radius:10px;min-width:18px;text-align:center}
.tabs{padding:10px 28px;background:#fff;border-bottom:1px solid var(--border);display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.tab{padding:9px 18px;border:none;background:transparent;color:#5a4e3c;border-radius:10px;cursor:pointer;font-weight:700;font-size:14px;transition:all 0.15s}
.tab.active{background:var(--wine);color:#fff}
.tab:hover:not(.active){background:#f0ebe0}
.tab .cnt{background:#e8e2d4;padding:2px 9px;border-radius:12px;font-size:11px;font-weight:800;margin-left:6px}
.tab.active .cnt{background:rgba(255,255,255,0.25)}
.content{padding:24px 28px;max-width:1200px;margin:0 auto}
.grid4{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-bottom:24px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:20px}
@media(max-width:800px){.grid2,.grid3{grid-template-columns:1fr}.grid4{grid-template-columns:1fr 1fr}.header{padding:12px 16px}.content{padding:16px}.tabs{padding:8px 16px}.pipeline{grid-template-columns:1fr 1fr!important}}
@media(max-width:500px){.grid4{grid-template-columns:1fr}.pipeline{grid-template-columns:1fr!important}}
.kpi{background:var(--card);border-radius:14px;padding:20px 24px;border:1px solid var(--border);position:relative;overflow:hidden}
.kpi .bar{position:absolute;top:0;left:0;width:4px;height:100%}
.kpi .label{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);font-weight:700;margin-bottom:8px}
.kpi .val{font-size:28px;font-weight:800;color:var(--text);line-height:1}
.kpi .icon{position:absolute;top:18px;right:20px;font-size:28px;opacity:0.15}
.card{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:22px;margin-bottom:20px}
.card h4{margin:0 0 16px;font-size:17px}
table{width:100%;border-collapse:collapse}
th{font-size:11px;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);font-weight:700;padding:12px 16px;text-align:left;background:var(--bg2);border-bottom:2px solid #e5dfcf}
td{padding:12px 16px;border-bottom:1px solid #f0ebe0;font-size:14px}
tr.click{cursor:pointer;transition:background 0.1s}
tr.click:hover{background:var(--bg2)}
.badge{display:inline-block;padding:3px 12px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap;letter-spacing:0.3px}
.inp{padding:10px 14px;border:1px solid #cdc5b4;border-radius:10px;font-size:14px;background:#fffdf9;width:100%;outline:none;transition:border 0.2s}
.inp:focus{border-color:var(--wine)}
.lbl{display:block;font-size:11px;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);font-weight:700;margin-bottom:5px}
.btn{display:inline-block;padding:10px 22px;border:none;border-radius:10px;cursor:pointer;font-weight:700;font-size:14px;transition:all 0.15s;text-align:center}
.btn-p{background:var(--wine);color:#fff;box-shadow:0 2px 8px rgba(114,47,55,0.2)}.btn-p:hover{background:#8a3a44}
.btn-s{background:#f0ebe0;color:#4a3f30}.btn-s:hover{background:#e5ddd0}
.btn-sm{padding:7px 14px;font-size:12px}
.btn-danger{background:#e74c3c;color:#fff}.btn-danger:hover{background:#c0392b}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-grid .full{grid-column:1/-1}
@media(max-width:600px){.form-grid{grid-template-columns:1fr}}

// ─── Alert engine ───
function getAlerts(){
  const alerts=[];
  const now=todayObj;
  const in7=new Date(now);in7.setDate(in7.getDate()+7);
  const in14=new Date(now);in14.setDate(in14.getDate()+14);
  const in30=new Date(now);in30.setDate(in30.getDate()+30);

  S.clients.forEach(c=>{
    // 1. RÉASSORT — cadence based on orders
    const co=S.orders.filter(o=>o.cid===c.id).sort((a,b)=>a.dt.localeCompare(b.dt));
    if(co.length>=2){
      const dates=co.map(o=>new Date(o.dt));
      let totalGap=0;
      for(let i=1;i<dates.length;i++) totalGap+=Math.round((dates[i]-dates[i-1])/(1000*60*60*24));
      const avgCadence=Math.round(totalGap/(dates.length-1));
      const lastOrder=dates[dates.length-1];
      const nextReorder=new Date(lastOrder);nextReorder.setDate(nextReorder.getDate()+avgCadence);
      const daysUntil=Math.round((nextReorder-now)/(1000*60*60*24));
      const pct=Math.max(0,Math.min(100,100-Math.round((daysUntil/avgCadence)*100)));

      if(daysUntil<=0){
        alerts.push({type:"reorder",urgency:"critical",icon:"📦",color:"#c0392b",title:"Réassort en retard — "+c.n,sub:`Cadence moyenne : ${avgCadence} jours. Dernière commande le ${fmtD(co[co.length-1].dt)}. Retard de ${Math.abs(daysUntil)} jour(s).`,rep:c.rp,cid:c.id,pct:100,days:daysUntil});
      } else if(daysUntil<=14){
        alerts.push({type:"reorder",urgency:"warning",icon:"📦",color:"#c49a2e",title:"Réassort à prévoir — "+c.n,sub:`Cadence : ${avgCadence} jours. Prochaine commande estimée le ${fmtD(nextReorder.toISOString().slice(0,10))} (dans ${daysUntil}j).`,rep:c.rp,cid:c.id,pct,days:daysUntil});
      } else if(daysUntil<=30){
        alerts.push({type:"reorder",urgency:"info",icon:"📦",color:"var(--blue)",title:"Réassort dans ${daysUntil} jours — "+c.n,sub:`Cadence : ${avgCadence}j. Dernière commande : ${fmtD(co[co.length-1].dt)}.`,rep:c.rp,cid:c.id,pct,days:daysUntil});
      }
    } else if(co.length===1){
      const lastD=new Date(co[0].dt);
      const daysSince=Math.round((now-lastD)/(1000*60*60*24));
      if(daysSince>45){
        alerts.push({type:"reorder",urgency:"warning",icon:"📦",color:"#c49a2e",title:"Relance commande — "+c.n,sub:`Une seule commande il y a ${daysSince} jours (${fmtD(co[0].dt)}). Prévoir une relance ?`,rep:c.rp,cid:c.id,pct:80,days:-daysSince});
      }
    }

    // 2. ANNIVERSAIRE
    if(c.bd){
      const thisYear=now.getFullYear();
      let bdDate=new Date(thisYear+"-"+c.bd.slice(5));
      if(bdDate<now){bdDate=new Date((thisYear+1)+"-"+c.bd.slice(5));}
      const daysUntilBd=Math.round((bdDate-now)/(1000*60*60*24));
      const age=bdDate.getFullYear()-parseInt(c.bd.slice(0,4));
      if(daysUntilBd===0) alerts.push({type:"birthday",urgency:"critical",icon:"🎂",color:"#e74c3c",title:"Anniversaire aujourd'hui — "+c.ct,sub:`${c.ct} (${c.n}) fête ses ${age} ans aujourd'hui ! Pensez à envoyer un message.`,rep:c.rp,cid:c.id,days:0});
      else if(daysUntilBd<=7) alerts.push({type:"birthday",urgency:"warning",icon:"🎂",color:"#c49a2e",title:`Anniversaire dans ${daysUntilBd}j — `+c.ct,sub:`${c.ct} (${c.n}) fêtera ses ${age} ans le ${fmtD(bdDate.toISOString().slice(0,10))}.`,rep:c.rp,cid:c.id,days:daysUntilBd});
      else if(daysUntilBd<=30) alerts.push({type:"birthday",urgency:"info",icon:"🎂",color:"var(--blue)",title:`Anniversaire le ${fmtD(bdDate.toISOString().slice(0,10))} — `+c.ct,sub:`${c.ct} (${c.n}) — dans ${daysUntilBd} jours.`,rep:c.rp,cid:c.id,days:daysUntilBd});
    }

    // 3. FÊTE
    if(c.fn && FETES[c.fn]){
      const feteMMDD=FETES[c.fn];
      const thisYear=now.getFullYear();
      let fDate=new Date(thisYear+"-"+feteMMDD);
      if(fDate<now){fDate=new Date((thisYear+1)+"-"+feteMMDD);}
      const daysUntilF=Math.round((fDate-now)/(1000*60*60*24));
      if(daysUntilF===0) alerts.push({type:"fete",urgency:"critical",icon:"🎉",color:"#8b6bab",title:"Bonne fête aujourd'hui — "+c.ct,sub:`C'est la Saint(e) ${c.fn} aujourd'hui ! Un petit mot à ${c.ct} (${c.n}) ?`,rep:c.rp,cid:c.id,days:0});
      else if(daysUntilF<=7) alerts.push({type:"fete",urgency:"warning",icon:"🎉",color:"#8b6bab",title:`Fête dans ${daysUntilF}j — `+c.ct,sub:`Saint(e) ${c.fn} le ${fmtD(fDate.toISOString().slice(0,10))}. Contact : ${c.ct} (${c.n}).`,rep:c.rp,cid:c.id,days:daysUntilF});
      else if(daysUntilF<=14) alerts.push({type:"fete",urgency:"info",icon:"🎉",color:"#8b6bab",title:`Fête le ${fmtD(fDate.toISOString().slice(0,10))} — `+c.ct,sub:`Saint(e) ${c.fn} — ${c.ct} (${c.n}), dans ${daysUntilF} jours.`,rep:c.rp,cid:c.id,days:daysUntilF});
    }
  });

  // Sort: critical first, then by days
  alerts.sort((a,b)=>{const u={critical:0,warning:1,info:2};return(u[a.urgency]||3)-(u[b.urgency]||3)||a.days-b.days;});
  return alerts;
}

function kpi(l,v,c,i){return`<div class="kpi"><div class="bar" style="background:${c}"></div><div class="label">${l}</div><div class="val">${v}</div><span class="icon">${i}</span></div>`;}

// ─── Render ───
function R(){
  const a=document.getElementById('app');
  if(!S.user){a.innerHTML=renderLogin();return;}
  let h='';
  if(S.toast)h+=`<div class="toast">${esc(S.toast)}</div>`;
  h+=renderHeader()+renderTabs()+'<div class="content">';
  if(S.form)h+=renderForm();
  else if(S.sel)h+=renderDetail();
  else if(S.tab==='dash')h+=renderDash();
  else if(S.tab==='clients')h+=renderClients();
  else if(S.tab==='pipe')h+=renderPipeline();
  else if(S.tab==='visits')h+=renderVisits();
  else if(S.tab==='alerts')h+=renderAlerts();
  else if(S.tab==='team')h+=renderTeam();
  h+='</div>';
  a.innerHTML=h;
}

// ─── TABS ───
function renderTabs(){
  const allAlerts=getAlerts();
  const urgC=allAlerts.filter(a=>a.urgency==='critical'||a.urgency==='warning').length;
  const t=(k,l,c)=>{const ac=S.tab===k?'active':'';const cn2=c!==undefined?`<span class="cnt">${c}</span>`:'';return`<button class="tab ${ac}" onclick="switchTab('${k}')">${l}${cn2}</button>`;};
  return`<div class="tabs">
    ${t('dash','Tableau de bord')}${t('clients','Clients',S.clients.length)}${t('pipe','Pipeline')}${t('visits','Visites',S.visits.length)}${t('alerts','🔔 Alertes',urgC>0?urgC:undefined)}${t('team','Équipe',S.reps.length)}
  </div>`;
}

// ─── ALERTS ───
function renderAlerts(){
  const allAlerts=getAlerts();
  const af=S.alertFilter;
  const filtered=af==='all'?allAlerts:af==='mine'?allAlerts.filter(a=>a.rep===S.user):allAlerts.filter(a=>a.type===af);

  const countByType={reorder:allAlerts.filter(a=>a.type==='reorder').length,birthday:allAlerts.filter(a=>a.type==='birthday').length,fete:allAlerts.filter(a=>a.type==='fete').length};
  const mine=allAlerts.filter(a=>a.rep===S.user).length;

  let h=`<div style="margin-bottom:24px"><h2 style="font-size:22px;margin-bottom:6px">Centre d'alertes</h2><p class="mt" style="font-size:14px">Réassorts, anniversaires et fêtes de vos contacts — anticipez chaque occasion.</p></div>`;

  // Filter bar
  h+=`<div class="alert-filter-bar">
    <button class="af-btn ${af==='all'?'active':''}" onclick="S.alertFilter='all';R()">Toutes (${allAlerts.length})</button>
    <button class="af-btn ${af==='mine'?'active':''}" onclick="S.alertFilter='mine';R()">Mes alertes (${mine})</button>
    <button class="af-btn ${af==='reorder'?'active':''}" onclick="S.alertFilter='reorder';R()">📦 Réassort (${countByType.reorder})</button>
    <button class="af-btn ${af==='birthday'?'active':''}" onclick="S.alertFilter='birthday';R()">🎂 Anniversaires (${countByType.birthday})</button>
    <button class="af-btn ${af==='fete'?'active':''}" onclick="S.alertFilter='fete';R()">🎉 Fêtes (${countByType.fete})</button>
  </div>`;

  if(filtered.length===0){
    h+=`<div class="card" style="text-align:center;padding:48px"><div style="font-size:48px;margin-bottom:16px">✨</div><p style="font-size:16px;color:var(--muted)">Aucune alerte pour le moment. Tout est sous contrôle !</p></div>`;
    return h;
  }

  filtered.forEach(a=>{
    const urgBg={critical:"#fde8e8",warning:"#fef8e8",info:"#e8f0fe"}[a.urgency]||"#f0f0f0";
    const urgLabel={critical:"Urgent",warning:"À prévoir",info:"À venir"}[a.urgency];
    const urgColor={critical:"#c0392b",warning:"#b8860b",info:"var(--blue)"}[a.urgency];
    h+=`<div class="alert-card" style="border-left:4px solid ${a.color}">
      <div class="alert-icon" style="background:${a.color}15">${a.icon}</div>
      <div class="alert-content">
        <div class="alert-title">${esc(a.title.replace(/\$\{(\w+)\}/g,''))}</div>
        <div class="alert-sub">${esc(a.sub)}</div>`;
    if(a.type==='reorder'&&a.pct!==undefined){
      const barCol=a.pct>=80?"var(--red)":a.pct>=50?"var(--orange)":"var(--green)";
      h+=`<div class="reorder-bar"><div class="reorder-fill" style="width:${a.pct}%;background:${barCol}"></div></div>`;
    }
    h+=`<div class="alert-meta">
          <span class="alert-tag" style="background:${urgBg};color:${urgColor}">${urgLabel}</span>
          <span class="alert-tag" style="background:var(--bg2);color:var(--muted)">${esc(a.rep)}</span>
          ${a.cid?`<button class="btn btn-sm btn-s" style="padding:3px 10px;font-size:11px" onclick="selectClient('${a.cid}')">Voir fiche →</button>`:''}
        </div>
      </div>
    </div>`;
  });
  return h;
}

// ─── DASHBOARD ───
function renderDash(){
  const totalCA=S.clients.reduce((a,c)=>a+c.ca,0);
  const refs=S.clients.filter(c=>c.st==="Référencé").length;
  const pipe=S.clients.filter(c=>!["Référencé","Perdu"].includes(c.st)).length;
  const alerts=getAlerts();
  const urgentAlerts=alerts.filter(a=>a.urgency==='critical'||a.urgency==='warning');

  let h=`<div class="grid4">${kpi("CA 2025",fmt(totalCA),"var(--wine)","💰")}${kpi("Clients réf.",refs,"var(--green)","✅")}${kpi("En pipeline",pipe,"var(--orange)","🎯")}${kpi("Alertes actives",urgentAlerts.length,"var(--red)","🔔")}</div>`;

  // Urgent alerts preview
  if(urgentAlerts.length>0){
    h+=`<div class="card" style="border-left:4px solid var(--red);margin-bottom:20px"><h4 style="color:var(--red)">⚠️ Alertes à traiter</h4>`;
    urgentAlerts.slice(0,4).forEach(a=>{
      h+=`<div class="activity-item"><div style="font-size:14px">${a.icon} <b>${esc(a.title.replace(/\$\{(\w+)\}/g,''))}</b> <span class="mt" style="font-size:12px">— ${esc(a.rep)}</span></div>
      <button class="btn btn-sm btn-s" style="padding:3px 10px;font-size:11px" onclick="switchTab('alerts')">Voir →</button></div>`;
    });
    if(urgentAlerts.length>4)h+=`<p style="margin-top:8px;font-size:13px;color:var(--muted)">+ ${urgentAlerts.length-4} autre(s)... <a href="#" onclick="switchTab('alerts');return false" style="color:var(--wine)">Voir tout</a></p>`;
    h+=`</div>`;
  }

  h+=`<div class="grid2">`;
  // Perf table
  h+=`<div class="card"><h4>Performance commerciaux</h4><table><thead><tr><th>Commercial</th><th>Clients</th><th>Réf.</th><th>Visites</th><th>CA 2025</th></tr></thead><tbody>`;
  S.reps.forEach(rp=>{const rc=S.clients.filter(c=>c.rp===rp);if(rc.length===0&&S.visits.filter(v=>v.rp===rp).length===0)return;h+=`<tr><td style="font-weight:700">${esc(rp)}</td><td>${rc.length}</td><td>${rc.filter(c=>c.st==="Référencé").length}</td><td>${S.visits.filter(v=>v.rp===rp).length}</td><td class="wt">${fmt(rc.reduce((a,c)=>a+c.ca,0))}</td></tr>`;});
  h+=`</tbody></table></div>`;
  // Recent
  h+=`<div class="card"><h4>Dernière activité</h4>`;
  [...S.visits].sort((a,b)=>b.dt.localeCompare(a.dt)).slice(0,6).forEach(v=>{const col=v.rs==="Positif"?"var(--green)":v.rs==="Négatif"?"#a86b6b":"var(--orange)";h+=`<div class="activity-item"><div style="font-size:14px"><b>${esc(cn(v.cid))}</b> <span class="mt" style="font-size:13px">— ${esc(v.tp)} par ${esc(v.rp)}</span></div><div style="display:flex;align-items:center;gap:8px"><span class="dot" style="background:${col}"></span><span style="font-size:12px" class="mt">${v.dt}</span></div></div>`;});
  h+=`</div></div>`;
  return h;
}

// ─── DETAIL ───
function renderDetail(){
  const c=S.sel;
  const cv=S.visits.filter(v=>v.cid===c.id).sort((a,b)=>b.dt.localeCompare(a.dt));
  const co=S.orders.filter(o=>o.cid===c.id).sort((a,b)=>b.dt.localeCompare(a.dt));
  const tCA=co.reduce((a,o)=>a+o.am,0);

  // Cadence info
  let cadenceHtml='';
  if(co.length>=2){
    const dates=co.map(o=>new Date(o.dt)).sort((a,b)=>a-b);
    let totalGap=0;for(let i=1;i<dates.length;i++)totalGap+=Math.round((dates[i]-dates[i-1])/(1000*60*60*24));
    const avg=Math.round(totalGap/(dates.length-1));
    const last=dates[dates.length-1];
    const next=new Date(last);next.setDate(next.getDate()+avg);
    const daysUntil=Math.round((next-todayObj)/(1000*60*60*24));
    const pct=Math.max(0,Math.min(100,100-Math.round((daysUntil/avg)*100)));
    const barCol=pct>=80?"var(--red)":pct>=50?"var(--orange)":"var(--green)";
    const status=daysUntil<=0?`<span style="color:var(--red);font-weight:700">⚠️ En retard de ${Math.abs(daysUntil)}j</span>`:daysUntil<=14?`<span style="color:var(--orange);font-weight:700">📦 Dans ${daysUntil} jours</span>`:`<span style="color:var(--green)">✅ Dans ${daysUntil} jours</span>`;
    cadenceHtml=`<div style="margin-top:20px;padding:16px;background:var(--bg2);border-radius:12px">
      <div class="lbl">📦 Cadence de réassort</div>
      <div style="display:flex;gap:24px;margin-top:10px;flex-wrap:wrap;font-size:14px">
        <div><span class="mt">Cadence moyenne :</span> <b>${avg} jours</b></div>
        <div><span class="mt">Dernière commande :</span> <b>${fmtD(co[0].dt)}</b></div>
        <div><span class="mt">Prochain réassort :</span> ${status}</div>
      </div>
      <div class="reorder-bar" style="margin-top:10px"><div class="reorder-fill" style="width:${pct}%;background:${barCol}"></div></div>
    </div>`;
  }

  // Birthday & fête info
  let personalHtml='';
  const infos=[];
  if(c.bd) infos.push(`🎂 Anniversaire : <b>${fmtD(c.bd)}</b>`);
  if(c.fn && FETES[c.fn]){const fd=FETES[c.fn];infos.push(`🎉 Fête (${esc(c.fn)}) : <b>${fd.split("-")[1]}/${fd.split("-")[0]}</b>`);}
  if(infos.length>0) personalHtml=`<div style="display:flex;gap:24px;flex-wrap:wrap;font-size:14px;margin-top:12px;padding:12px 16px;background:#fef8f0;border-radius:10px;border:1px solid #f0e4d0">${infos.map(i=>`<div>${i}</div>`).join('')}</div>`;

  let h=`<button class="back-btn" onclick="S.sel=null;R()">← Retour</button>`;
  h+=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px"><div>
    <h2 style="margin:0 0 10px;font-size:24px">${IC[c.t]||""} ${esc(c.n)}</h2>
    <div style="display:flex;gap:8px;flex-wrap:wrap">${badge(c.st)} ${badge(c.t)} ${badge(c.rp)}</div>
  </div><div style="display:flex;gap:8px">
    <button class="btn btn-s btn-sm" onclick="openNewOrderFor('${c.id}')">+ Commande</button>
    <button class="btn btn-s btn-sm" onclick="openNewVisitFor('${c.id}')">+ Visite</button>
    <button class="btn btn-p btn-sm" onclick="openEditClient('${c.id}')">Modifier</button>
  </div></div>`;
  h+=`<div class="detail-info">`;
  [["Contact",c.ct],["Téléphone",c.ph],["Email",c.em],["Département",c.dp],["Adresse",c.ad]].forEach(([l,v])=>{h+=`<div><div class="lbl">${l}</div><div style="font-weight:500;margin-top:3px;font-size:14px">${esc(v)||"—"}</div></div>`;});
  if(c.nt)h+=`<div class="full"><div class="lbl">Notes</div><div style="font-style:italic;color:#6b5e4a;margin-top:3px">${esc(c.nt)}</div></div>`;
  h+=`</div>${personalHtml}${cadenceHtml}`;
  // Stage changer
  h+=`<div style="margin-top:20px;padding:16px;background:var(--bg2);border-radius:12px"><div class="lbl">Changer le stade</div><div class="stages-bar">`;
  STAGES.forEach(st=>{const col=SCC[st];const ac=c.st===st;h+=`<button class="sbtn" style="border-color:${ac?col:'#ddd'};background:${ac?col+'20':'#fff'};color:${ac?col:'#888'}${ac?';border-width:2px':''}" onclick="updateStage('${c.id}','${st}')">${st}</button>`;});
  h+=`</div></div></div>`;
  h+=`<div class="grid3">${kpi("CA commandes",fmt(tCA),"var(--wine)","💰")}${kpi("Commandes",co.length,"#b8860b","📦")}${kpi("Visites",cv.length,"var(--green)","🚗")}</div>`;
  h+=`<div class="grid2"><div class="card"><h4>Historique visites</h4>`;
  if(cv.length===0)h+=`<p style="color:#bbb;font-size:14px">Aucune visite</p>`;
  cv.forEach(v=>{const col=v.rs==="Positif"?"var(--green)":v.rs==="Négatif"?"#a86b6b":"#b8860b";h+=`<div style="padding:12px 0;border-bottom:1px solid #f0ebe0"><div style="display:flex;justify-content:space-between;font-size:14px"><b>${esc(v.tp)} — ${esc(v.rp)}</b><span class="mt" style="font-size:13px">${v.dt}</span></div><p style="margin:5px 0 3px;font-size:13px;color:#5a4e3c;line-height:1.5">${esc(v.nt)}</p><span style="font-size:12px;font-weight:700;color:${col}">${esc(v.rs)}</span></div>`;});
  h+=`</div><div class="card"><h4>Commandes</h4>`;
  if(co.length===0)h+=`<p style="color:#bbb;font-size:14px">Aucune commande</p>`;
  co.forEach(o=>{const stCol=o.st==="Livrée"?"var(--green)":o.st==="Annulée"?"var(--red)":"var(--orange)";h+=`<div style="padding:12px 0;border-bottom:1px solid #f0ebe0"><div style="display:flex;justify-content:space-between;font-size:14px"><b class="wt">${fmt(o.am)}</b><span class="mt" style="font-size:13px">${fmtD(o.dt)}</span></div><p style="margin:4px 0;font-size:13px;color:#5a4e3c">${esc(o.pr)}</p>${o.st?`<span style="font-size:11px;font-weight:700;color:${stCol}">${esc(o.st)}</span>`:''}</div>`;});
  h+=`</div></div>`;return h;
}

  } else {

// ─── TEAM ───

  h+=`<div class="add-rep-row"><input class="inp" style="flex:1;max-width:300px;background:#fff" placeholder="Prénom du nouveau commercial..." id="nri" value="${esc(S.newRepName)}" oninput="S.newRepName=this.value" onkeydown="if(event.key==='Enter')doAddRep()"><button class="btn btn-p" onclick="doAddRep()">+ Ajouter</button></div>`;
  h+=`<div class="team-grid">`;
  S.reps.forEach((rep,i)=>{const rc=S.clients.filter(c=>c.rp===rep);const rv=S.visits.filter(v=>v.rp===rep);const ca=rc.reduce((a,c)=>a+c.ca,0);const me=rep===S.user;

      <div class="team-stats"><span><b>${rc.length}</b> clients</span><span><b>${rv.length}</b> visites</span><span><b>${fmt(ca)}</b></span></div>
    </div>
    <button class="btn btn-sm ${rc.length>0?'btn-s':'btn-danger'}" onclick="doRemoveRep(${i})" ${me?'disabled style="opacity:0.3;cursor:not-allowed"':''}>${rc.length>0?'Réaffecter d\'abord':'Supprimer'}</button></div>`;
  });
  h+=`</div>`;

  h+=`<div class="card" style="margin-top:32px;border:1px dashed #d4c4a4;background:#fdfbf7">
    <h4 style="font-size:15px;margin-bottom:8px;color:var(--muted)">🔒 Zone administrateur</h4>
    <p style="font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:16px">
      La réinitialisation efface <b>toutes les données</b> (clients, visites, commandes) et repart de zéro. Cette action est irréversible et nécessite le code administrateur.
    </p>
    <button class="btn btn-sm" style="background:#f5e8e8;color:var(--red);border:1px solid #e8c4c4" onclick="doReset()">⚠️ Réinitialiser toutes les données</button>
  </div>`;

  return h;
}

// ─── Actions ───
function doLogin(n){S.user=n;R();}
function doLogout(){S.user=null;R();}
function switchTab(t){S.tab=t;S.sel=null;S.form=null;R();}
function selectClient(id){S.sel=S.clients.find(c=>c.id===id);S.form=null;S.tab='clients';R();}
function openNewClient(){S.form='newclient';S.sel=null;S.tab='clients';S.fd={n:"",t:"GMS",ct:"",fn:"",ph:"",em:"",ad:"",dp:"73 - Savoie",rp:S.user,st:"Prospect",nt:"",ca:0,bd:"",fn:""};R();}
function openEditClient(id){S.form='editclient';S.fd={...S.clients.find(x=>x.id===id)};R();}
function openNewVisit(){S.form='newvisit';S.sel=null;S.tab='visits';S.fd={cid:S.clients[0]?.id||"",rp:S.user,dt:new Date().toISOString().slice(0,10),tp:"Suivi",nt:"",rs:"En attente"};R();}
function openNewVisitFor(cid){S.form='newvisit';S.fd={cid,rp:S.user,dt:new Date().toISOString().slice(0,10),tp:"Suivi",nt:"",rs:"En attente"};R();}
function openNewOrder(){S.form='neworder';S.sel=null;S.tab='clients';S.fd={cid:S.clients[0]?.id||"",dt:new Date().toISOString().slice(0,10),pr:"",am:0,st:"En attente",nt:""};R();}
function openNewOrderFor(cid){S.form='neworder';S.fd={cid,dt:new Date().toISOString().slice(0,10),pr:"",am:0,st:"En attente",nt:""};R();}
function doAddOrder(){const fd=S.fd;if(!fd.cid||!fd.pr||!fd.am){toast("Remplissez le client, les produits et le montant");return;}S.orders.push({id:"o"+Date.now(),cid:fd.cid,dt:fd.dt,pr:fd.pr,am:Number(fd.am),st:fd.st,nt:fd.nt||""});S.form=null;persist();toast("Commande enregistrée !");R();}
function doAddClient(){const fd=S.fd;if(!fd.n){toast("Nom du client requis");return;}S.clients.push({...fd,id:"c"+Date.now(),cr:new Date().toISOString().slice(0,10),ca:Number(fd.ca)||0});S.form=null;persist();toast("Client ajouté !");R();}
function doEditClient(){const fd=S.fd;S.clients=S.clients.map(c=>c.id===fd.id?{...fd,ca:Number(fd.ca)||0}:c);S.sel={...fd,ca:Number(fd.ca)||0};S.form=null;persist();toast("Client mis à jour !");R();}
function doAddVisit(){const fd=S.fd;if(!fd.cid||!fd.dt||!fd.tp){toast("Remplissez tous les champs");return;}S.visits.push({...fd,id:"v"+Date.now()});S.form=null;persist();toast("Visite enregistrée !");R();}
function updateStage(cid,st){S.clients=S.clients.map(c=>c.id===cid?{...c,st}:c);if(S.sel&&S.sel.id===cid)S.sel={...S.sel,st};persist();toast("Stade mis à jour !");R();}
async function doReset(){const pwd=prompt("⚠️ ATTENTION : Cela effacera TOUTES les données (clients, visites, commandes).\n\nEntrez le code administrateur pour confirmer :");if(pwd!=="VIALLET2025"){if(pwd!==null)toast("Code administrateur incorrect");return;}const d=await apiReset();if(d){S.reps=d.reps||[];S.clients=d.clients||[];S.visits=d.visits||[];S.orders=d.orders||[];}toast("Données réinitialisées");R();}
function doAddRep(){const name=S.newRepName.trim();if(!name){toast("Entrez un prénom");return;}if(S.reps.includes(name)){toast("Ce commercial existe déjà");return;}S.reps.push(name);S.newRepName="";persist();toast(name+" ajouté !");R();}
function doRemoveRep(i){const name=S.reps[i];if(name===S.user){toast("Impossible de vous supprimer");return;}const rc=S.clients.filter(c=>c.rp===name);if(rc.length>0){toast(name+" a "+rc.length+" client(s). Réaffectez-les d'abord.");return;}if(!confirm("Supprimer "+name+" ?"))return;S.reps.splice(i,1);persist();toast(name+" retiré");R();}

// ─── Init ───
(async function(){
  const d=await apiLoad();
  if(d){S.reps=d.reps||["Gérôme","Laurent","Christophe","David","Doriane"];S.clients=d.clients||[];S.visits=d.visits||[];S.orders=d.orders||[];}
  else{S.reps=["Gérôme","Laurent","Christophe","David","Doriane"];}
  R();
})();
</script>
